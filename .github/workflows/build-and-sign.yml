name: Build and Sign Installer

on:
  workflow_dispatch:
    inputs:
      sign_installer:
        description: "Submit the unsigned installer to SignPath after a successful build"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ClamAV from source ────────────────────────────────────────
  build_clamav:
    name: Build ClamAV (MinGW-w64, Linux cross-compile)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out clamav-win32 (without submodules)
        uses: actions/checkout@v6
        with:
          repository: clamwin/clamav-win32
          submodules: false

      - name: Install MinGW-w64 cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake make python3

      - name: Rewrite git:// (port 9418) URLs to HTTPS for SourceForge
        run: |
          git config --global \
            url."https://git.code.sf.net/p/".insteadOf \
            "git://git.code.sf.net/p/"

      - name: Initialise submodules recursively
        run: git submodule update --init --recursive

      - name: Pin Rust to 1.94.1 and add Windows targets
        run: |
          rustup toolchain install 1.94.1
          rustup default 1.94.1
          rustup target add i686-pc-windows-gnu x86_64-pc-windows-gnu

      - name: CMake configure – legacy-x86 (WinXP)
        env:
          CARGO_BUILD_TARGET: i686-pc-windows-gnu
          CARGO_TARGET_I686_PC_WINDOWS_GNU_LINKER: i686-w64-mingw32-gcc
        run: |
          cmake \
            -S . \
            -B build-x86-mingw-winxp \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw-x86.cmake \
            "-DCMAKE_C_FLAGS=-std=gnu17 -Wno-error=implicit-function-declaration" \
            -DENABLE_LEGACY=ON \
            -DCLAMWIN_SHELLEXT_UNICODE=ON \
            -DUSE_ZLIB_NG_ON_X86=ON

      - name: Build ClamAV – legacy-x86 (WinXP)
        env:
          CARGO_BUILD_TARGET: i686-pc-windows-gnu
          CARGO_TARGET_I686_PC_WINDOWS_GNU_LINKER: i686-w64-mingw32-gcc
        run: |
          make -C build-x86-mingw-winxp \
            clambc clamscan freshclam sigtool \
            clamd clamdscan clamdtop \
            libclamunrar libclamunrar_iface

      - name: CMake configure – legacy-x64 (Vista+)
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          cmake \
            -S . \
            -B build-x64-mingw \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw-x64.cmake \
            "-DCMAKE_C_FLAGS=-std=gnu17 -Wno-error=implicit-function-declaration" \
            -DENABLE_LEGACY=ON \
            -DCLAMWIN_SHELLEXT_UNICODE=ON

      - name: Build ClamAV – legacy-x64 (Vista+)
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          make -C build-x64-mingw \
            clambc clamscan freshclam sigtool \
            clamd clamdscan clamdtop \
            libclamunrar libclamunrar_iface

      - name: Collect and upload ClamAV binaries
        id: collect
        run: |
          outRoot="$RUNNER_TEMP/clamav-output"
          mkdir -p "$outRoot/legacy-x86" "$outRoot/legacy-x64"

          items=(
            clambc.exe clamscan.exe freshclam.exe sigtool.exe
            clamd.exe clamdscan.exe clamdtop.exe
            libclamav.dll libfreshclam.dll
            libclamunrar.dll libclamunrar_iface.dll
          )

          for f in "${items[@]}"; do
            [ -f "build-x86-mingw-winxp/$f" ] && cp "build-x86-mingw-winxp/$f" "$outRoot/legacy-x86/"
            [ -f "build-x64-mingw/$f"       ] && cp "build-x64-mingw/$f"       "$outRoot/legacy-x64/"
          done

          echo "=== legacy-x86 ===" && ls -lh "$outRoot/legacy-x86/"
          echo "=== legacy-x64 ===" && ls -lh "$outRoot/legacy-x64/"

          echo "output_root=$outRoot" >> "$GITHUB_OUTPUT"

      - name: Upload ClamAV legacy-x86 binaries
        uses: actions/upload-artifact@v7
        with:
          name: clamav-legacy-x86-gcc12
          path: ${{ steps.collect.outputs.output_root }}/legacy-x86/
          if-no-files-found: error

      - name: Upload ClamAV legacy-x64 binaries
        uses: actions/upload-artifact@v7
        with:
          name: clamav-legacy-x64-gcc12
          path: ${{ steps.collect.outputs.output_root }}/legacy-x64/
          if-no-files-found: error

  # ── Job 2: Build ClamAV Win9x from source (branch 1.4) ────────────────────
  build_clamav_win9x:
    name: Build ClamAV Win9x (MinGW-w64, Linux cross-compile, branch 1.4)
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out clamav-win32 branch 1.4 (without submodules)
        uses: actions/checkout@v6
        with:
          repository: clamwin/clamav-win32
          ref: refs/heads/1.4
          submodules: false

      - name: Install MinGW-w64 cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake make python3

      - name: Rewrite git:// (port 9418) URLs to HTTPS for SourceForge
        run: |
          git config --global \
            url."https://git.code.sf.net/p/".insteadOf \
            "git://git.code.sf.net/p/"

      - name: Initialise submodules recursively
        run: git submodule update --init --recursive

      - name: Pin Rust to 1.94.1 and add i686 Windows target
        run: |
          rustup toolchain install 1.94.1
          rustup default 1.94.1
          rustup target add i686-pc-windows-gnu

      - name: CMake configure – legacy-win9x
        env:
          CARGO_BUILD_TARGET: i686-pc-windows-gnu
          CARGO_TARGET_I686_PC_WINDOWS_GNU_LINKER: i686-w64-mingw32-gcc
        run: |
          cmake \
            -S . \
            -B build-x86-mingw-win9x \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw-x86.cmake \
            "-DCMAKE_C_FLAGS=-std=gnu11 -Wno-error=implicit-function-declaration"

      - name: Build ClamAV – legacy-win9x
        env:
          CARGO_BUILD_TARGET: i686-pc-windows-gnu
          CARGO_TARGET_I686_PC_WINDOWS_GNU_LINKER: i686-w64-mingw32-gcc
        run: |
          make -C build-x86-mingw-win9x \
            clambc clamscan freshclam sigtool \
            libclamunrar libclamunrar_iface

      - name: Collect and upload ClamAV Win9x binaries
        id: collect
        run: |
          outDir="$RUNNER_TEMP/clamav-win9x-output"
          mkdir -p "$outDir"

          items=(
            clambc.exe clamscan.exe freshclam.exe sigtool.exe
            libclamav.dll libfreshclam.dll
            libclamunrar.dll libclamunrar_iface.dll
          )

          for f in "${items[@]}"; do
            [ -f "build-x86-mingw-win9x/$f" ] && cp "build-x86-mingw-win9x/$f" "$outDir/"
          done

          echo "=== legacy-win9x ===" && ls -lh "$outDir/"

          echo "output_dir=$outDir" >> "$GITHUB_OUTPUT"

      - name: Upload ClamAV legacy-win9x binaries
        uses: actions/upload-artifact@v7
        with:
          name: clamav-legacy-win9x-gcc12
          path: ${{ steps.collect.outputs.output_dir }}/
          if-no-files-found: error

  # ── Job 3: Build ClamWin installer ─────────────────────────────────────────
  package_installer:
    name: Package Installer
    runs-on: windows-latest
    needs: [build_clamav, build_clamav_win9x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download freshly built ClamAV legacy-win9x binaries
        uses: actions/download-artifact@v8
        with:
          name: clamav-legacy-win9x-gcc12
          path: setup/clamav-binaries/clamav-legacy-win9x

      - name: Download freshly built ClamAV legacy-x86 binaries
        uses: actions/download-artifact@v8
        with:
          name: clamav-legacy-x86-gcc12
          path: setup/clamav-binaries/clamav-legacy-x86

      - name: Download freshly built ClamAV legacy-x64 binaries
        uses: actions/download-artifact@v8
        with:
          name: clamav-legacy-x64-gcc12
          path: setup/clamav-binaries/clamav-legacy-x64

      - name: Validate SignPath configuration
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer }}
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          $missing = @()
          foreach ($name in @(
            "SIGNPATH_API_TOKEN",
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required SignPath configuration: $($missing -join ', ')"
          }

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-i686-gcc
            mingw-w64-i686-make
            mingw-w64-i686-curl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-curl

      - name: Prepare repo-local Inno Setup 5.2.3 toolchain
        shell: pwsh
        run: |
          $toolRoot = Join-Path $env:GITHUB_WORKSPACE "setup\InnoSetup\Inno Setup 5"
          if (!(Test-Path $toolRoot)) {
            throw "Repo-local Inno Setup 5.2.3 toolchain directory not found: $toolRoot"
          }

          $required = @(
            "ISCC.exe",
            "ISCmplr.dll",
            "ISCmplr.dls",
            "Builtins.iss",
            "Default.isl",
            "Setup.e32",
            "SetupLdr.e32",
            "iszlib.dll",
            "isbzip.dll",
            "isbunzip.dll",
            "islzma.dll",
            "isunzlib.dll"
          )

          foreach ($leaf in $required) {
            $path = Join-Path $toolRoot $leaf
            if (!(Test-Path $path)) {
              throw "Repo-local Inno Setup toolchain is missing required file: $path"
            }
          }

      - name: Verify Inno Setup 5 compiler
        id: iscc
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "setup\InnoSetup\Inno Setup 5\ISCC.exe"),
            "C:\Program Files (x86)\Inno Setup 5\ISCC.exe",
            "C:\Program Files\Inno Setup 5\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($iscc)) {
            throw "ISCC.exe was not found in the repo-local Inno Setup 5.2.3 toolchain or standard install locations."
          }

          $versionOutput = (& $iscc /? 2>&1) | Out-String
          $probeExitCode = $LASTEXITCODE
          @(
            "Resolved ISCC: $iscc",
            "ProbeExitCode: $probeExitCode",
            $versionOutput.TrimEnd()
          ) | Tee-Object -FilePath "inno-setup-version.log"

          if (($versionOutput -notmatch "Inno Setup.*5\.") -and ($iscc -notmatch "Inno Setup 5")) {
            throw "Expected Inno Setup 5.x, but ISCC output/path did not prove Version 5.x."
          }

          $probeDir = Join-Path $env:RUNNER_TEMP "inno-ispp-probe"
          New-Item -ItemType Directory -Path $probeDir -Force | Out-Null
          $probeScript = Join-Path $probeDir "ispp-probe.iss"
          @(
            '#define ProbeToken "ISPP_OK"',
            '[Setup]',
            'AppName=ISPP Probe',
            'AppVersion=1.0',
            'AppVerName=ISPP Probe 1.0',
            'DefaultDirName={tmp}\ISPPProbe',
            'OutputDir=.',
            'OutputBaseFilename=ispp-probe',
            'DisableProgramGroupPage=yes',
            'Uninstallable=no'
          ) | Set-Content -Path $probeScript -Encoding ascii

          $isppOutput = (& $iscc $probeScript 2>&1) | Out-String
          $isppExitCode = $LASTEXITCODE
          @(
            '',
            'ISPP probe:',
            "ISPPProbeExitCode: $isppExitCode",
            $isppOutput.TrimEnd()
          ) | Add-Content -Path "inno-setup-version.log"

          if ($isppExitCode -ne 0) {
            throw "Expected ISPP support from the repo-local Inno Setup 5.2.3 toolchain, but the probe compile failed."
          }

          # ISCC returns a nonzero exit code for the help screen; do not let that fail the step.
          $global:LASTEXITCODE = 0

          "ISCC_EXE=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "iscc_exe=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Inno Setup version log
        uses: actions/upload-artifact@v7
        with:
          name: inno-setup-version-log
          path: inno-setup-version.log
          if-no-files-found: error

      - name: Build unsigned installer
        shell: pwsh
        run: |
          $prebuiltClamAvRoot = Join-Path $env:GITHUB_WORKSPACE "setup\clamav-binaries"

          # Remove the SHA256 manifest so build-setup.ps1 skips hash verification
          # against the vendored binaries - we've replaced x86/x64 with freshly built ones
          $manifest = Join-Path $prebuiltClamAvRoot "SHA256SUMS.txt"
          if (Test-Path $manifest) { Remove-Item $manifest -Force }

          $outputDir = Join-Path $env:GITHUB_WORKSPACE "setup\Output"
          if (Test-Path $outputDir) {
            Remove-Item $outputDir -Recurse -Force
          }

          & .\tools\build-setup.ps1 -PrebuiltClamAvRoot $prebuiltClamAvRoot -IsccPath $env:ISCC_EXE

      - name: Locate unsigned installer
        id: unsigned
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "setup\Output" -Filter "clamwin-*-setup-nodb*.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No unsigned ClamWin installer was produced under setup\Output."
          }

          Write-Host "Unsigned installer: $($installer.FullName)"
          "unsigned_installer=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload unsigned installer artifact
        id: upload_unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-clamwin-installer
          path: ${{ steps.unsigned.outputs.unsigned_installer }}
          if-no-files-found: error

      - name: Submit signing request to SignPath
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer }}
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Show SignPath request
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer }}
        shell: pwsh
        run: |
          Write-Host "SignPath signing request: ${{ steps.signpath.outputs.signing-request-web-url }}"

      - name: Validate signed installer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer }}
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path "signed" -Filter "*.exe" -File -Recurse
          if ($signed.Count -eq 0) {
            throw "SignPath completed but no signed .exe was found under signed/."
          }

          $signed | ForEach-Object { Write-Host "Signed installer: $($_.FullName)" }

      - name: Upload signed installer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer }}
        uses: actions/upload-artifact@v7
        with:
          name: signed-clamwin-installer
          path: signed/**/*.exe
          if-no-files-found: error

      - name: Publish signed installer to GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_installer && startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $signed = Get-ChildItem -Path "signed" -Filter "*.exe" -File -Recurse
          if ($signed.Count -eq 0) {
            throw "No signed installers found to publish."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Signed ClamWin installer for $tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub Release for tag $tag."
            }
          }

          foreach ($file in $signed) {
            gh release upload $tag $file.FullName --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload signed installer to GitHub Release: $($file.FullName)"
            }
          }
